services:
  - name: kotori-backend
    type: web
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.api:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: HUGGINGFACE_API_TOKEN
        value: "<your_huggingface_api_token>"
      - key: CHROMA_DIR
        value: "./chroma"
      - key: DATA_DIR
        value: "./data"